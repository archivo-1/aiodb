<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Theme Lab — Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #020617;
      --panel: #0b1220;
      --panel-soft: #0f172a;
      --border-soft: rgba(148, 163, 184, 0.35);
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #111827 0, #020617 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .status {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .status strong {
      color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 12px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .panel {
      background: rgba(15, 23, 42, 0.96);
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 120px;
    }

    .panel h2 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    label {
      font-size: 0.78rem;
      color: var(--muted);
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: #020617;
      color: #e5e7eb;
      font-size: 0.82rem;
    }

    input[type="checkbox"] {
      width: auto;
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .inline label {
      margin: 0;
    }

    .small {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .message {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 6px 0;
    }

    .error {
      color: #fca5a5;
    }

    .buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      font-family: inherit;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.95);
      color: #f9fafb;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      white-space: nowrap;
    }

    button.primary {
      border-color: rgba(59, 130, 246, 0.9);
      background: linear-gradient(to right, #1d4ed8, #2563eb);
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .preview-box {
      border-radius: 10px;
      border: 1px dashed rgba(148, 163, 184, 0.4);
      padding: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Theme Lab — Editor</h1>
      <span id="dirarc-label">Cargando DirArc…</span>
    </div>
    <div id="status" class="status">Verificando sesión…</div>
  </header>

  <div id="message" class="message"></div>

  <main class="layout">
    <section class="panel">
      <h2>Base del tema</h2>

      <div class="field-group">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="obsidian">Obsidian (actual)</option>
          <option value="paper">Paper (claro)</option>
          <!-- Más presets en el futuro -->
        </select>
        <div class="small">El preset define un punto de partida para los colores.</div>
      </div>

      <div class="field-group">
        <label>Colores principales</label>
        <div class="field-group">
          <label for="color-bg">Fondo (bg)</label>
          <input id="color-bg" type="text" placeholder="#050608">
        </div>
        <div class="field-group">
          <label for="color-surface">Superficie (surface)</label>
          <input id="color-surface" type="text" placeholder="#0d1117">
        </div>
        <div class="field-group">
          <label for="color-accent">Acento (accent)</label>
          <input id="color-accent" type="text" placeholder="#3b82f6">
        </div>
      </div>

      <div class="field-group">
        <label>Fondo</label>
        <div class="inline">
          <input id="bg-mode-solid" type="radio" name="bg-mode" value="solid" checked>
          <label for="bg-mode-solid">Color sólido</label>
        </div>
        <div class="inline">
          <input id="bg-mode-image" type="radio" name="bg-mode" value="image">
          <label for="bg-mode-image">Imagen</label>
        </div>
        <div class="field-group">
          <label for="bg-color">Color de fondo</label>
          <input id="bg-color" type="text" placeholder="#050608">
        </div>
        <div class="field-group">
          <label for="bg-image">URL de imagen de fondo</label>
          <input id="bg-image" type="text" placeholder="https://...">
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Branding</h2>

      <div class="field-group">
        <div class="inline">
          <input id="use-custom-title" type="checkbox">
          <label for="use-custom-title">Usar título personalizado</label>
        </div>
        <input id="custom-title" type="text" placeholder="Título visible en Aio Repo">
      </div>

      <div class="field-group">
        <div class="inline">
          <input id="show-subtitle" type="checkbox" checked>
          <label for="show-subtitle">Mostrar subtítulo</label>
        </div>
        <input id="custom-subtitle" type="text" placeholder="Subtítulo opcional">
      </div>

      <div class="field-group">
        <label for="logo-url">Logo (URL opcional)</label>
        <input id="logo-url" type="text" placeholder="https://...">
      </div>

      <div class="field-group">
        <label>Thumbnails</label>
        <select id="thumb-set">
          <option value="gt_0">Set por defecto (gt_0)</option>
          <!-- otros sets en el futuro -->
        </select>
      </div>

      <div class="preview-box">
        Esta vista aún no aplica el tema al viewer. V1 solo guarda la configuración
        para que Aio Repo C la use al cargar el DirArc.
      </div>

      <div class="buttons">
        <button id="btn-cancel">Cerrar</button>
        <button id="btn-save" class="primary">Guardar tema</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://zihojlqhxfxdjahgrbwy.supabase.co";
    const SUPABASE_ANON_KEY = "sb-publishable-TZeZu-g4BDlcdXOfWpUGQrN-Sur8t";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const msgEl = document.getElementById("message");
    const dirarcLabelEl = document.getElementById("dirarc-label");

    const presetEl = document.getElementById("preset");
    const colorBgEl = document.getElementById("color-bg");
    const colorSurfaceEl = document.getElementById("color-surface");
    const colorAccentEl = document.getElementById("color-accent");

    const bgModeSolidEl = document.getElementById("bg-mode-solid");
    const bgModeImageEl = document.getElementById("bg-mode-image");
    const bgColorEl = document.getElementById("bg-color");
    const bgImageEl = document.getElementById("bg-image");

    const useCustomTitleEl = document.getElementById("use-custom-title");
    const customTitleEl = document.getElementById("custom-title");
    const showSubtitleEl = document.getElementById("show-subtitle");
    const customSubtitleEl = document.getElementById("custom-subtitle");
    const logoUrlEl = document.getElementById("logo-url");
    const thumbSetEl = document.getElementById("thumb-set");

    const btnCancel = document.getElementById("btn-cancel");
    const btnSave = document.getElementById("btn-save");

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const dirarcId = getQueryParam("dirarcId");
    const dirarcSlug = getQueryParam("slug") || "";

    const THEME_DEFAULT = {
      version: 1,
      preset: "obsidian",
      colors: {
        bg: "#050608",
        surface: "#0d1117",
        surface2: "#111520",
        border: "rgba(255,255,255,0.07)",
        border2: "rgba(255,255,255,0.12)",
        text: "#e5e7eb",
        muted: "#6b7280",
        accent: "#3b82f6",
        accentDim: "rgba(59,130,246,0.15)"
      },
      background: {
        mode: "solid",
        color: "#050608",
        imageUrl: "",
        imageFit: "cover",
        overlay: 0.18
      },
      branding: {
        useCustomTitle: false,
        customTitle: "",
        showSubtitle: true,
        customSubtitle: "",
        logoUrl: ""
      },
      thumbnails: {
        genericSet: "gt_0",
        preferCustomItemThumbnail: true
      }
    };

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function renderMessage(text, isError = false) {
      msgEl.textContent = text || "";
      msgEl.className = "message" + (isError ? " error" : "");
    }

    function applyThemeToForm(theme) {
      presetEl.value = theme.preset || "obsidian";

      colorBgEl.value = theme.colors?.bg || "";
      colorSurfaceEl.value = theme.colors?.surface || "";
      colorAccentEl.value = theme.colors?.accent || "";

      const mode = theme.background?.mode || "solid";
      bgModeSolidEl.checked = mode === "solid";
      bgModeImageEl.checked = mode === "image";
      bgColorEl.value = theme.background?.color || "";
      bgImageEl.value = theme.background?.imageUrl || "";

      useCustomTitleEl.checked = !!theme.branding?.useCustomTitle;
      customTitleEl.value = theme.branding?.customTitle || "";
      showSubtitleEl.checked = theme.branding?.showSubtitle ?? true;
      customSubtitleEl.value = theme.branding?.customSubtitle || "";
      logoUrlEl.value = theme.branding?.logoUrl || "";

      thumbSetEl.value = theme.thumbnails?.genericSet || "gt_0";
    }

    function readThemeFromForm(baseTheme) {
      const theme = clone(baseTheme);

      theme.preset = presetEl.value || "obsidian";

      theme.colors.bg = colorBgEl.value || baseTheme.colors.bg;
      theme.colors.surface = colorSurfaceEl.value || baseTheme.colors.surface;
      theme.colors.accent = colorAccentEl.value || baseTheme.colors.accent;

      const mode = bgModeImageEl.checked ? "image" : "solid";
      theme.background.mode = mode;
      theme.background.color = bgColorEl.value || baseTheme.background.color;
      theme.background.imageUrl = bgImageEl.value || "";

      theme.branding.useCustomTitle = useCustomTitleEl.checked;
      theme.branding.customTitle = customTitleEl.value || "";
      theme.branding.showSubtitle = showSubtitleEl.checked;
      theme.branding.customSubtitle = customSubtitleEl.value || "";
      theme.branding.logoUrl = logoUrlEl.value || "";

      theme.thumbnails.genericSet = thumbSetEl.value || "gt_0";

      return theme;
    }

    async function loadSessionAndDirArc() {
      if (!dirarcId) {
        dirarcLabelEl.textContent = "Falta dirarcId en la URL.";
        renderMessage("Abre Theme Lab desde el launcher para seleccionar un DirArc.", true);
        statusEl.textContent = "Error";
        btnSave.disabled = true;
        return;
      }

      const { data, error } = await supabase.auth.getUser();

      if (error || !data.user) {
        statusEl.textContent = "Sesión no encontrada";
        renderMessage(
          "No se encontró una sesión activa. Abre Aio Dashboard e inicia sesión primero.",
          true
        );
        btnSave.disabled = true;
        return;
      }

      statusEl.innerHTML = `Conectado como <strong>${data.user.email}</strong>`;
      renderMessage("Cargando configuración de tema…");

      const { data: dirarcs, error: dirarcError } = await supabase
        .from("dirarcs")
        .select("id, slug, title, theme_config")
        .eq("id", dirarcId)
        .maybeSingle();

      if (dirarcError || !dirarcs) {
        dirarcLabelEl.textContent = "DirArc no encontrado.";
        renderMessage(
          "No se encontró el DirArc seleccionado. Verifica el enlace.",
          true
        );
        btnSave.disabled = true;
        return;
      }

      const dirarc = dirarcs;
      const label = dirarc.title || dirarc.slug || dirarcId;
      dirarcLabelEl.textContent = `Editando: ${label}`;

      const theme = dirarc.theme_config
        ? Object.assign(clone(THEME_DEFAULT), dirarc.theme_config)
        : clone(THEME_DEFAULT);

      applyThemeToForm(theme);
      renderMessage("Puedes editar el tema y guardar los cambios.");
    }

    btnCancel.onclick = () => {
      window.close();
    };

    btnSave.onclick = async () => {
      btnSave.disabled = true;
      renderMessage("Guardando tema…");

      const theme = readThemeFromForm(THEME_DEFAULT);

      const { error } = await supabase
        .from("dirarcs")
        .update({ theme_config: theme })
        .eq("id", dirarcId);

      if (error) {
        renderMessage("Error guardando tema: " + error.message, true);
        btnSave.disabled = false;
        return;
      }

      renderMessage("Tema guardado correctamente.");
      btnSave.disabled = false;
    };

    loadSessionAndDirArc().catch((err) => {
      console.error("Theme Lab editor error", err);
      renderMessage("Error inesperado cargando Theme Lab.", true);
      statusEl.textContent = "Error";
      btnSave.disabled = true;
    });
  </script>
</body>
</html>
