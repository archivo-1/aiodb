<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Theme Lab — Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #020617;
      --panel: #0b1220;
      --panel-soft: #0f172a;
      --border-soft: rgba(148, 163, 184, 0.35);
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #111827 0, #020617 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .status {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .status strong {
      color: var(--accent);
    }

    .panel {
      background: rgba(15, 23, 42, 0.96);
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 120px;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .dirarc-list {
      list-style: none;
      margin: 4px 0 0;
      padding: 0;
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.8rem;
    }

    .dirarc-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
    }

    .dirarc-item + .dirarc-item {
      margin-top: 4px;
    }

    .dirarc-item:hover {
      border-color: rgba(96, 165, 250, 0.7);
      background: rgba(15, 23, 42, 0.98);
    }

    .dirarc-item.active {
      border-color: rgba(96, 165, 250, 1);
      background: rgba(30, 64, 175, 0.45);
    }

    .dirarc-main {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      align-items: center;
    }

    .dirarc-title {
      font-weight: 500;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .dirarc-slug {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .dirarc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .chip {
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      font-size: 0.68rem;
    }

    .pill {
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 0.68rem;
      border: 1px solid transparent;
    }

    .pill.has-theme {
      border-color: rgba(34, 197, 94, 0.7);
      color: #bbf7d0;
      background: rgba(22, 101, 52, 0.35);
    }

    .pill.no-theme {
      border-color: rgba(148, 163, 184, 0.4);
      color: var(--muted);
      background: rgba(15, 23, 42, 0.8);
    }

    .message {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 8px 0;
    }

    .error {
      color: #fca5a5;
    }

    .small {
      font-size: 0.75rem;
      color: var(--muted);
    }

    button {
      font-family: inherit;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.95);
      color: #f9fafb;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      white-space: nowrap;
    }

    button.primary {
      border-color: rgba(59, 130, 246, 0.9);
      background: linear-gradient(to right, #1d4ed8, #2563eb);
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Theme Lab</h1>
      <span>Selecciona un Aio Repo (DirArc) para editar su tema</span>
    </div>
    <div id="status" class="status">Cargando sesión…</div>
  </header>

  <section class="panel">
    <div class="list-header">
      <span>Mis DirArcs</span>
      <span class="small" id="active-label">Activo en dashboard: ninguno</span>
    </div>
    <div id="message" class="message"></div>
    <ul id="dirarc-list" class="dirarc-list"></ul>
  </section>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://zihojlqhxfxdjahgrbwy.supabase.co";
    const SUPABASE_ANON_KEY = "sb-publishable-TZeZu-g4BDlcdXOfWpUGQrN-Sur8t";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const msgEl = document.getElementById("message");
    const listEl = document.getElementById("dirarc-list");
    const activeLabelEl = document.getElementById("active-label");

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    const activeDirArcId = getQueryParam("activeDirArcId") || null;
    const activeSlug = getQueryParam("activeSlug") || null;

    if (activeSlug) {
      activeLabelEl.textContent = `Activo en dashboard: ${activeSlug}`;
    }

    function renderMessage(text, isError = false) {
      msgEl.textContent = text || "";
      msgEl.className = "message" + (isError ? " error" : "");
    }

    function renderDirArcList(dirarcs) {
      listEl.innerHTML = "";

      if (!dirarcs.length) {
        renderMessage("No tienes DirArcs aún. Crea uno desde Aio Dashboard.");
        return;
      }

      renderMessage("");

      dirarcs.forEach((d) => {
        const li = document.createElement("li");
        li.className = "dirarc-item";

        if (activeDirArcId && d.id === activeDirArcId) {
          li.classList.add("active");
        }

        const hasTheme = !!d.theme_config;

        const main = document.createElement("div");
        main.className = "dirarc-main";

        const titleDiv = document.createElement("div");
        titleDiv.className = "dirarc-title";
        titleDiv.textContent = d.title || d.slug || "(sin título)";

        const themePill = document.createElement("span");
        themePill.className = "pill " + (hasTheme ? "has-theme" : "no-theme");
        themePill.textContent = hasTheme ? "Theme definido" : "Theme por defecto";

        main.appendChild(titleDiv);
        main.appendChild(themePill);

        const meta = document.createElement("div");
        meta.className = "dirarc-meta";

        const slugSpan = document.createElement("span");
        slugSpan.className = "dirarc-slug";
        slugSpan.textContent = d.slug || "(sin slug)";

        const idSpan = document.createElement("span");
        idSpan.className = "chip";
        idSpan.textContent = d.id.slice(0, 8) + "…";

        meta.appendChild(slugSpan);
        meta.appendChild(idSpan);

        li.appendChild(main);
        li.appendChild(meta);

        li.onclick = () => openEditorForDirArc(d);

        listEl.appendChild(li);
      });
    }

    function openEditorForDirArc(dirarc) {
      // Abrimos el editor en nueva ventana con el id del dirarc
      const url = `theme-lab-editor.html?dirarcId=${encodeURIComponent(
        dirarc.id
      )}&slug=${encodeURIComponent(dirarc.slug || "")}`;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    async function loadSessionAndDirArcs() {
      statusEl.textContent = "Verificando sesión…";

      const { data, error } = await supabase.auth.getUser();

      if (error || !data.user) {
        statusEl.textContent = "Sesión no encontrada";
        renderMessage(
          "No se encontró una sesión activa. Abre Aio Dashboard e inicia sesión primero.",
          true
        );
        return;
      }

      statusEl.innerHTML = `Conectado como <strong>${data.user.email}</strong>`;
      renderMessage("Cargando DirArcs…");

      const { data: dirarcs, error: dirarcError } = await supabase
        .from("dirarcs")
        .select("id, slug, title, theme_config")
        .eq("owner_user_id", data.user.id)
        .order("created_at", { ascending: true });

      if (dirarcError) {
        renderMessage(
          "Error cargando DirArcs: " + dirarcError.message,
          true
        );
        return;
      }

      renderDirArcList(dirarcs || []);
    }

    loadSessionAndDirArcs().catch((err) => {
      console.error("Theme Lab launcher error", err);
      renderMessage("Error inesperado cargando Theme Lab.", true);
      statusEl.textContent = "Error";
    });
  </script>
</body>
</html>
