<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cajón de aplicaciones de Aio Repo</title>
  <meta name="theme-color" content="#050608" />
  <style>
    :root {
      --bg: #050608;
      --panel: #0d1015;
      --panel-2: #131922;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.2);
      --text: #e8edf5;
      --muted: #9aa6b8;
      --faint: #718096;
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius: 22px;
      --radius-sm: 14px;
      --accent: #8fb7ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(143,183,255,0.12), transparent 32%),
        linear-gradient(180deg, #040507 0%, #090c11 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 20px;
    }

    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 32px; /* Increased gap to separate hero from apps */
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 24px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 2vw, 2.4rem);
      line-height: 1.1;
      font-weight: 700;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 70ch;
      line-height: 1.55;
      font-size: 0.98rem;
    }

    /* Changed from Grid to Flexbox to center the apps like a folder */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px 48px;
      padding: 20px 0;
    }

    /* Stripped card styling to make them invisible containers */
    .viewer-card {
      appearance: none;
      border: none;
      background: transparent;
      color: inherit;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      width: 90px;
      box-shadow: none;
    }

    .viewer-card:focus-visible {
      outline: none;
    }

    .viewer-top {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    /* The icon now acts as the primary visual element */
   /* Contenedor del ícono */
    .viewer-icon {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      overflow: hidden; /* Para que la imagen respete las esquinas redondeadas */
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      transition:
        transform 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275),
        border-color 200ms ease,
        box-shadow 200ms ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border: 1px solid var(--border);
    }

    /* Estilo de la imagen dentro del ícono */
    .viewer-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Cubre todo el área del botón */
      display: block;
    }

    /* Efecto Hover actualizado */
    .viewer-card:hover .viewer-icon {
      transform: translateY(-6px) scale(1.08);
      border-color: var(--border-strong);
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
    }

    /* Hide unnecessary card elements */
    .viewer-badge,
    .viewer-desc,
    .viewer-formats,
    .viewer-footer {
      display: none;
    }

    .viewer-body {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    /* Styled like an app label on a desktop */
    .viewer-name {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.2;
      text-align: center;
      color: var(--text);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .note {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .status {
      min-height: 1.5em;
      color: var(--muted);
      font-size: 0.88rem;
      padding-left: 2px;
      text-align: center;
    }

    .status.ok { color: #9fddb4; }
    .status.warn { color: #f3c87c; }
    .status.error { color: #f29aa3; }

    @media (max-width: 780px) {
      body { padding: 14px; }
      .shell { gap: 24px; }
      .hero { border-radius: 18px; }
      
      .grid {
        gap: 24px 20px;
      }
      
      .viewer-icon {
        width: 64px;
        height: 64px;
        font-size: 1.6rem;
        border-radius: 16px;
      }
      
      .viewer-name {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Aio Suite · Visores</div>
      <h1>Cajón de aplicaciones</h1>
      <p>
        Visores para archivos locales · Modo Drag & Drop
      </p>
    </section>

   <section class="grid" aria-label="Apps de Aio Viewers">
      <button class="viewer-card" data-app="3dm" type="button">
        <div class="viewer-top">
          <div class="viewer-icon">
            <img src="thumbnails/app_3dm.png" alt="Icono 3DM">
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-name">Aio 3DM</h2>
        </div>
      </button>

      <button class="viewer-card" data-app="ifc" type="button">
        <div class="viewer-top">
          <div class="viewer-icon">
            <img src="thumbnails/app_ifc.png" alt="Icono IFC">
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-name">Aio IFC</h2>
        </div>
      </button>

      <button class="viewer-card" data-app="dxf" type="button">
        <div class="viewer-top">
          <div class="viewer-icon">
            <img src="thumbnails/app_dxf.png" alt="Icono DXF">
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-name">Aio DXF</h2>
        </div>
      </button>

      <button class="viewer-card" data-app="map" type="button">
        <div class="viewer-top">
          <div class="viewer-icon">
            <img src="thumbnails/app_geojson.png" alt="Icono Mapas">
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-name">Aio Mapas</h2>
        </div>
      </button>

      <button class="viewer-card" data-app="media" type="button">
        <div class="viewer-top">
          <div class="viewer-icon">
            <img src="thumbnails/app_media.png" alt="Icono Media">
          </div>
        </div>
        <div class="viewer-body">
          <h2 class="viewer-name">Aio Media</h2>
        </div>
      </button>
    </section>

    <section class="note">
      ⓘ El modo drag & drop no cuenta con soporte para compartir archivos, los datos se guardan en la memoria local del navegador.
    </section>

    <div class="status" id="status">Selecciona una app para continuar.</div>
  </main>

  <script>
    const BASE_VIEWER_URL = 'https://archivo-1.github.io/aiorepo.c/local-preview.html';
    const statusEl = document.getElementById('status');

    function setStatus(text, type = '') {
      statusEl.className = 'status' + (type ? ' ' + type : '');
      statusEl.textContent = text;
    }

    function openViewerApp(appKey, appLabel) {
      const url = BASE_VIEWER_URL + '?app=' + encodeURIComponent(appKey);

      const popup = window.open(
        url,
        '_blank',
        'popup=yes,width=1280,height=820,left=60,top=40,resizable=yes,scrollbars=yes'
      );

      if (popup) {
        setStatus(appLabel + ' se abrió correctamente en una ventana nueva.', 'ok');
      } else {
        setStatus('El navegador bloqueó la apertura de ' + appLabel + '. Revisa la configuración de popups para este sitio.', 'warn');
      }
    }

    document.querySelectorAll('.viewer-card').forEach((button) => {
      button.addEventListener('click', () => {
        const appKey = button.dataset.app;
        const appLabel = button.querySelector('.viewer-name')?.textContent || appKey;
        openViewerApp(appKey, appLabel);
      });
    });
  </script>
</body>
</html>
